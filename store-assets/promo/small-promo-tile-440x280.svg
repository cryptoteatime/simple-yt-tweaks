<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="28" y1="26" x2="404" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151A22"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3EE0B8"/>
      <stop offset="1" stop-color="#2BC5EA"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="480" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="440" height="280" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="438" height="278" rx="25" stroke="rgba(255,255,255,0.06)"/>

  <g filter="url(#shadow)">
    <rect x="252" y="34" width="154" height="208" rx="16" fill="#11151D" stroke="#2A303B"/>
    <text x="266" y="58" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="700">Simple YT Tweaks</text>
    <circle cx="388" cy="52" r="7" fill="url(#accent)"/>

    <rect x="266" y="72" width="126" height="26" rx="9" fill="#171D27" stroke="#2A303B"/>
    <rect x="272" y="78" width="46" height="14" rx="7" fill="url(#accent)" opacity="0.24"/>
    <text x="284" y="88" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700">General</text>
    <text x="333" y="88" fill="#AEB7C4" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700">Sidebar</text>

    <rect x="266" y="108" width="126" height="108" rx="12" fill="#151A22" stroke="#2A303B"/>
    <text x="278" y="130" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="9.5" font-weight="600">Hide Shorts</text>
    <rect x="345" y="118" width="30" height="17" rx="8.5" fill="#183B36" stroke="#2CCCA9"/>
    <circle cx="366" cy="126.5" r="6.5" fill="#44E2C2"/>

    <text x="278" y="159" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="9.5" font-weight="600">3-column Home</text>
    <rect x="326" y="147" width="49" height="18" rx="9" fill="#171F29" stroke="#323A48"/>
    <text x="339" y="159" fill="#D8E0EA" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700">3 cols</text>

    <text x="278" y="188" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="9.5" font-weight="600">PiP Button</text>
    <rect x="345" y="176" width="30" height="17" rx="8.5" fill="#183B36" stroke="#2CCCA9"/>
    <circle cx="366" cy="184.5" r="6.5" fill="#44E2C2"/>
  </g>

  <text x="32" y="72" fill="#F6F8FC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Clean up YouTube</text>
  <text x="32" y="102" fill="#F6F8FC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">without the clutter.</text>
  <text x="32" y="132" fill="#AAB4C2" font-family="Inter, Arial, sans-serif" font-size="11.5" font-weight="500">Modes, sidebar cleanup, Shorts hiding,</text>
  <text x="32" y="149" fill="#AAB4C2" font-family="Inter, Arial, sans-serif" font-size="11.5" font-weight="500">sponsored cleanup, end-screen cleanup, PiP.</text>

  <g transform="translate(32 190)">
    <rect width="82" height="24" rx="12" fill="#151B23" stroke="#2B3441"/>
    <text x="19" y="16" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="10.5" font-weight="700">Modes</text>
    <rect x="92" width="90" height="24" rx="12" fill="#151B23" stroke="#2B3441"/>
    <text x="114" y="16" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="10.5" font-weight="700">Sidebar</text>
    <rect x="190" width="64" height="24" rx="12" fill="#151B23" stroke="#2B3441"/>
    <text x="214" y="16" fill="#F3F6FB" font-family="Inter, Arial, sans-serif" font-size="10.5" font-weight="700">PiP</text>
  </g>
</svg>
