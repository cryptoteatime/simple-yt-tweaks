      <stop stop-color="#141922"/>
      <stop offset="1" stop-color="#090C12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#40E0BA"/>
      <stop offset="1" stop-color="#31C3EA"/>
    </linearGradient>
    <filter id="cardShadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="638" rx="31" stroke="rgba(255,255,255,0.06)"/>

