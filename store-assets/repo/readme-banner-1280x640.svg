  <text x="70" y="314" fill="#A8B3C2" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">Unofficial Chrome and Brave extension with focused layout</text>
  <text x="70" y="346" fill="#A8B3C2" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">and player controls for a cleaner YouTube experience.</text>

